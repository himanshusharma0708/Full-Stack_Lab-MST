<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="container">
    <center><h1 id="title" class="title">Expense Tracker</h1></center>

    <div id="form" class="form">
      <div class="field">
        <span class="field-label">Expense Name:</span>
        <input id="name" class="input input-name" type="text" placeholder="Expense name" />
      </div>

      <div class="field">
        <span class="field-label">Amount:</span>
        <input id="amount" class="input input-amount" type="number"  placeholder="Amount" />
      </div>

      <div class="field">
        <span class="field-label">Category:</span>
        <select id="category" class="select select-category">
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
        </select>
      </div>

      <div class="actions" id="formActions">
        <button id="addBtn" class="btn btn-add">Add Expense</button>
        <button id="updateBtn" class="btn btn-update" style="display:none">Update Expense</button>
        <button id="clearBtn" class="btn btn-clear">Clear</button>
      </div>
    </div>

    <h2 id="listTitle" class="list-title">Expenses</h2>

    <div id="tableWrap" class="table-wrap">
      <table id="expenseTable" class="table">
        <thead>
          <tr class="table-head">
            <th class="th-name">Expense_Name</th>
            <th class="th-category">Category</th>
            <th class="th-amount">Amount</th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="expenseBody" class="table-body">
        </tbody>
      </table>
    </div>

    <div id="summary" class="summary">
      <h3 class="total-label">Total: <span id="total" class="total-value">Rs. 0.00</span></h3>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
